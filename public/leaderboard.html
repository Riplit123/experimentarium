<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Таблица лидеров - Экспериментариум</title>
    <style>
        /* ========== БАЗОВЫЕ СТИЛИ (без изменений) ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
            -webkit-tap-highlight-color: transparent;
        }

        input, textarea, [contenteditable="true"] {
            -webkit-user-select: text;
            -moz-user-select: text;
            -ms-user-select: text;
            user-select: text;
        }

        body {
            -webkit-user-drag: none;
            user-drag: none;
            font-family: 'Rubik', 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a3a 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            color: #fff;
            overflow-x: hidden;
        }

        /* Научный фон с элементами */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 30%, rgba(59, 130, 246, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(139, 92, 246, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 40% 80%, rgba(34, 197, 94, 0.05) 0%, transparent 50%);
            z-index: -2;
        }

        .science-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(59, 130, 246, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(59, 130, 246, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: -1;
            opacity: 0.4;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            padding: 30px 0;
            width: 100%;
            max-width: 1200px;
            position: relative;
        }

        .header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 3px;
            background: linear-gradient(90deg, transparent, #3b82f6, #10b981, transparent);
            border-radius: 2px;
        }

        .header h1 {
            font-size: 3.2rem;
            font-weight: 800;
            margin-bottom: 16px;
            background: linear-gradient(135deg, #60a5fa 0%, #34d399 50%, #a78bfa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 4px 30px rgba(96, 165, 250, 0.3);
            letter-spacing: -0.5px;
        }

        .header p {
            font-size: 1.2rem;
            color: #94a3b8;
            font-weight: 400;
            line-height: 1.6;
        }

        .lobby-selector {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
            width: 100%;
            max-width: 1200px;
            flex-wrap: wrap;
        }

        .lobby-selector label {
            font-size: 1rem;
            font-weight: 500;
            color: #94a3b8;
            letter-spacing: 0.5px;
        }

        .lobby-selector select {
            padding: 12px 24px;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            border: 2px solid #3b82f6;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 500;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Rubik', sans-serif;
        }

        .lobby-selector select:hover {
            border-color: #60a5fa;
            background: rgba(30, 41, 59, 0.95);
        }

        .lobby-selector select:focus {
            outline: none;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.3);
        }

        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 40px;
            width: 100%;
            max-width: 1200px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .stat-item {
            text-align: center;
            padding: 20px 30px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            border: 1px solid rgba(59, 130, 246, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
            min-width: 160px;
        }

        .stat-item:hover {
            transform: translateY(-5px);
            border-color: rgba(59, 130, 246, 0.4);
            box-shadow: 0 12px 40px rgba(59, 130, 246, 0.3);
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: 700;
            color: #60a5fa;
            margin-bottom: 8px;
            text-shadow: 0 2px 10px rgba(96, 165, 250, 0.4);
        }

        .stat-label {
            font-size: 0.9rem;
            color: #cbd5e1;
            font-weight: 500;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .leaderboard {
            width: 100%;
            max-width: 1200px;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
            margin-bottom: 40px;
            border: 2px solid rgba(59, 130, 246, 0.3);
            position: relative;
        }

        .leaderboard::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #3b82f6, #10b981, #8b5cf6);
            z-index: 2;
        }

        .leaderboard-header {
            background: rgba(30, 41, 59, 0.9);
            padding: 25px 30px;
            display: grid;
            grid-template-columns: 80px 1fr 200px;
            gap: 20px;
            font-weight: 700;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #60a5fa;
            border-bottom: 2px solid rgba(59, 130, 246, 0.2);
        }

        .leaderboard-content {
            max-height: 600px;
            overflow-y: auto;
        }

        .leaderboard-item {
            display: grid;
            grid-template-columns: 80px 1fr 200px;
            gap: 20px;
            padding: 25px 30px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
            align-items: center;
            min-height: 100px;
            position: relative;
            background: rgba(255, 255, 255, 0.02);
        }

        .leaderboard-item:hover {
            background: rgba(59, 130, 246, 0.1);
            transform: translateX(5px);
        }

        .leaderboard-item.first {
            background: linear-gradient(90deg, rgba(255, 215, 0, 0.1), transparent);
            border-left: 4px solid #FFD700;
        }

        .leaderboard-item.second {
            background: linear-gradient(90deg, rgba(192, 192, 192, 0.1), transparent);
            border-left: 4px solid #C0C0C0;
        }

        .leaderboard-item.third {
            background: linear-gradient(90deg, rgba(205, 127, 50, 0.1), transparent);
            border-left: 4px solid #CD7F32;
        }

        .leaderboard-item.completed {
            background: linear-gradient(90deg, rgba(34, 197, 94, 0.1), transparent);
            border-left: 4px solid #10b981;
        }

        .rank {
            font-size: 2rem;
            font-weight: 800;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .rank-1 { 
            color: #FFD700;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
        }
        .rank-2 { 
            color: #C0C0C0;
            text-shadow: 0 0 15px rgba(192, 192, 192, 0.4);
        }
        .rank-3 { 
            color: #CD7F32;
            text-shadow: 0 0 10px rgba(205, 127, 50, 0.4);
        }
        .rank-4, .rank-5, .rank-6 { 
            color: #94a3b8;
        }

        .team-info {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .team-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.2), rgba(139, 92, 246, 0.2));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            border: 2px solid rgba(59, 130, 246, 0.3);
        }

        .team-details {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .team-name {
            font-size: 1.4rem;
            font-weight: 700;
            color: #f1f5f9;
        }

        .team-id {
            font-size: 0.85rem;
            color: #94a3b8;
            font-family: 'JetBrains Mono', monospace;
            letter-spacing: 0.5px;
        }

        .team-status {
            display: flex;
            gap: 10px;
            margin-top: 5px;
        }

        .status-badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            backdrop-filter: blur(10px);
        }

        .status-playing {
            background: rgba(59, 130, 246, 0.3);
            color: #93c5fd;
            border: 1px solid rgba(59, 130, 246, 0.5);
        }

        .status-completed {
            background: rgba(16, 185, 129, 0.3);
            color: #6ee7b7;
            border: 1px solid rgba(16, 185, 129, 0.5);
        }

        .potions-count {
            font-size: 2rem;
            font-weight: 800;
            color: #60a5fa;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 15px;
            background: rgba(59, 130, 246, 0.1);
            border-radius: 12px;
            border: 2px solid rgba(59, 130, 246, 0.2);
            position: relative;
        }

        .potions-count::before {
            content: '🧪';
            font-size: 1.5rem;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-5px); }
        }

        .controls {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            width: 100%;
            max-width: 1200px;
            justify-content: center;
        }

        .btn {
            padding: 16px 32px;
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            text-align: center;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            box-shadow: 0 8px 25px rgba(59, 130, 246, 0.4);
        }

        .btn:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 12px 30px rgba(59, 130, 246, 0.6);
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #8b5cf6 0%, #7c3aed 100%);
            box-shadow: 0 8px 25px rgba(139, 92, 246, 0.4);
        }

        .btn-secondary:hover {
            background: linear-gradient(135deg, #7c3aed 0%, #6d28d9 100%);
            box-shadow: 0 12px 30px rgba(139, 92, 246, 0.6);
        }

        .last-update {
            margin-top: 25px;
            padding: 15px 30px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 25px;
            border: 1px solid rgba(59, 130, 246, 0.2);
            color: #94a3b8;
            display: flex;
            align-items: center;
            gap: 20px;
            font-size: 1rem;
        }

        .refresh-btn {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            border: none;
            border-radius: 50px;
            padding: 10px 24px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.9rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            box-shadow: 0 6px 20px rgba(16, 185, 129, 0.4);
        }

        .refresh-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(16, 185, 129, 0.6);
            background: linear-gradient(135deg, #059669 0%, #047857 100%);
        }

        .empty-state {
            text-align: center;
            padding: 80px 20px;
            font-size: 1.3rem;
            color: #94a3b8;
            grid-column: 1 / -1;
        }

        /* ========== МОДАЛЬНОЕ ОКНО ТОП-3 ========== */
        .top-three-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            animation: fadeIn 0.3s ease;
        }

        .top-three-modal.active {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .top-three-title {
            font-size: 3.5rem;
            font-weight: 800;
            margin-bottom: 60px;
            background: linear-gradient(135deg, #FFD700, #FFA500, #FF8C00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
            letter-spacing: 2px;
        }

        .top-three-container {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 40px;
            margin-bottom: 60px;
            perspective: 1000px;
        }

        .podium-card {
            width: 300px;
            padding: 30px;
            border-radius: 25px;
            text-align: center;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-origin: bottom;
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(20px);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
        }

        .podium-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 10px;
            border-radius: 25px 25px 0 0;
        }

        .podium-card.gold {
            background: linear-gradient(145deg, rgba(255, 215, 0, 0.15), rgba(255, 165, 0, 0.1));
            border: 3px solid rgba(255, 215, 0, 0.4);
            transform: translateY(-50px) scale(1.1);
            animation: goldGlow 2s infinite alternate;
        }

        .podium-card.gold::before {
            background: linear-gradient(90deg, #FFD700, #FFA500);
        }

        .podium-card.silver {
            background: linear-gradient(145deg, rgba(192, 192, 192, 0.15), rgba(169, 169, 169, 0.1));
            border: 3px solid rgba(192, 192, 192, 0.4);
            transform: translateY(-20px);
            animation: silverGlow 2s infinite alternate;
        }

        .podium-card.silver::before {
            background: linear-gradient(90deg, #C0C0C0, #A9A9A9);
        }

        .podium-card.bronze {
            background: linear-gradient(145deg, rgba(205, 127, 50, 0.15), rgba(210, 180, 140, 0.1));
            border: 3px solid rgba(205, 127, 50, 0.4);
            transform: translateY(-10px);
            animation: bronzeGlow 2s infinite alternate;
        }

        .podium-card.bronze::before {
            background: linear-gradient(90deg, #CD7F32, #D2B48C);
        }

        @keyframes goldGlow {
            0% { box-shadow: 0 25px 50px rgba(255, 215, 0, 0.3); }
            100% { box-shadow: 0 35px 70px rgba(255, 215, 0, 0.5); }
        }

        @keyframes silverGlow {
            0% { box-shadow: 0 20px 40px rgba(192, 192, 192, 0.3); }
            100% { box-shadow: 0 30px 60px rgba(192, 192, 192, 0.5); }
        }

        @keyframes bronzeGlow {
            0% { box-shadow: 0 15px 30px rgba(205, 127, 50, 0.3); }
            100% { box-shadow: 0 25px 50px rgba(205, 127, 50, 0.5); }
        }

        .podium-rank {
            font-size: 4rem;
            font-weight: 900;
            margin-bottom: 20px;
            position: relative;
            display: inline-block;
        }

        .podium-card.gold .podium-rank {
            color: #FFD700;
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.7);
        }

        .podium-card.silver .podium-rank {
            color: #C0C0C0;
            text-shadow: 0 0 25px rgba(192, 192, 192, 0.6);
        }

        .podium-card.bronze .podium-rank {
            color: #CD7F32;
            text-shadow: 0 0 20px rgba(205, 127, 50, 0.6);
        }

        .podium-icon {
            font-size: 4rem;
            margin: 20px 0;
            display: block;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .podium-team-name {
            font-size: 1.8rem;
            font-weight: 700;
            color: white;
            margin: 15px 0;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
        }

        .podium-team-id {
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.8);
            font-family: 'JetBrains Mono', monospace;
            margin-bottom: 20px;
            background: rgba(0, 0, 0, 0.2);
            padding: 8px 15px;
            border-radius: 20px;
            display: inline-block;
        }

        .podium-score {
            font-size: 2.5rem;
            font-weight: 800;
            color: #60a5fa;
            background: rgba(59, 130, 246, 0.2);
            padding: 15px 30px;
            border-radius: 15px;
            border: 2px solid rgba(59, 130, 246, 0.3);
            display: inline-flex;
            align-items: center;
            gap: 15px;
            margin-top: 10px;
        }

        .podium-score::before {
            content: '🧪';
            font-size: 2rem;
        }

        .modal-instruction {
            color: #94a3b8;
            font-size: 1.2rem;
            margin-top: 30px;
            text-align: center;
            padding: 15px 30px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            border: 1px solid rgba(59, 130, 246, 0.2);
        }

        /* ========== ПЕРСОНАЖ (НЕ БЛОКИРУЕТ ИНТЕРФЕЙС) ========== */
        .character-message {
            position: fixed;
            bottom: 30px;
            right: 30px;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            z-index: 1500;
            pointer-events: none;
            opacity: 0;
            transform: translateX(50px);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            max-width: 400px;
        }

        .character-message.active {
            opacity: 1;
            transform: translateX(0);
        }

        .character-dialogue {
            background: linear-gradient(145deg, rgba(30, 41, 59, 0.95), rgba(15, 23, 42, 0.95));
            border-radius: 20px;
            padding: 18px 22px;
            margin-bottom: 15px;
            border: 2px solid #3b82f6;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            color: #f1f5f9;
            border-left: 6px solid #3b82f6;
            font-size: 1.3rem;
            line-height: 1.5;
            position: relative;
            max-width: 350px;
            word-break: break-word;
        }

        .character-dialogue::after {
            content: '';
            position: absolute;
            bottom: -12px;
            right: 30px;
            width: 0;
            height: 0;
            border-left: 12px solid transparent;
            border-right: 12px solid transparent;
            border-top: 12px solid #3b82f6;
        }

        .character-avatar {
            width: 440px;
            height: 440px;
            object-fit: contain;
            filter: drop-shadow(0 5px 15px rgba(0, 0, 0, 0.5));
            border-radius: 10px;
        }

        @media (max-width: 900px) {
            .character-message {
                bottom: 20px;
                right: 20px;
                max-width: 320px;
            }
            .character-dialogue {
                min-width: 240px;
                font-size: 0.95rem;
            }
            .character-avatar {
                width: 70px;
                height: 70px;
            }
        }

        @media (max-width: 600px) {
            .character-message {
                bottom: 15px;
                right: 15px;
                left: 15px;
                align-items: center;
                max-width: 100%;
            }
            .character-dialogue {
                width: 100%;
                max-width: 100%;
            }
            .character-dialogue::after {
                right: 40px;
            }
            .character-avatar {
                width: 60px;
                height: 60px;
            }
        }

        /* Парящие элементы */
        .floating-element {
            position: fixed;
            width: 100px;
            height: 100px;
            background: radial-gradient(circle at 30% 30%, rgba(59, 130, 246, 0.15), transparent 70%);
            border-radius: 50%;
            animation: floatElement 6s ease-in-out infinite;
            z-index: -1;
        }

        .floating-element:nth-child(1) {
            top: 10%;
            left: 5%;
            animation-delay: 0s;
        }

        .floating-element:nth-child(2) {
            top: 70%;
            right: 10%;
            animation-delay: -2s;
            background: radial-gradient(circle at 70% 30%, rgba(139, 92, 246, 0.15), transparent 70%);
        }

        .floating-element:nth-child(3) {
            bottom: 20%;
            left: 15%;
            animation-delay: -4s;
            background: radial-gradient(circle at 50% 50%, rgba(16, 185, 129, 0.15), transparent 70%);
        }

        @keyframes floatElement {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(180deg); }
        }

        @media (max-width: 1200px) {
            .leaderboard-header,
            .leaderboard-item {
                grid-template-columns: 70px 1fr 180px;
                gap: 15px;
                padding: 20px;
            }
            .header h1 { font-size: 2.8rem; }
            .top-three-container { gap: 20px; }
            .podium-card { width: 250px; }
        }

        @media (max-width: 900px) {
            .leaderboard-header,
            .leaderboard-item {
                grid-template-columns: 60px 1fr 150px;
                padding: 15px;
            }
            .header h1 { font-size: 2.2rem; }
            .top-three-container {
                flex-direction: column;
                align-items: center;
                gap: 30px;
            }
            .podium-card {
                width: 80%;
                max-width: 400px;
                transform: none !important;
                margin-bottom: 10px;
            }
            .podium-card.gold { order: 1; }
            .podium-card.silver { order: 2; }
            .podium-card.bronze { order: 3; }
            .team-name { font-size: 1.2rem; }
            .potions-count { font-size: 1.6rem; padding: 10px; }
        }

        @media (max-width: 600px) {
            .leaderboard-header,
            .leaderboard-item {
                grid-template-columns: 50px 1fr;
                grid-template-rows: auto auto;
            }
            .potions-count {
                grid-column: 1 / -1;
                grid-row: 2;
                margin-top: 15px;
            }
            .stats-bar { flex-direction: column; align-items: center; }
            .stat-item { width: 100%; max-width: 300px; }
            .controls { flex-direction: column; }
            .btn { width: 100%; max-width: 300px; }
            .team-info { flex-direction: column; align-items: flex-start; gap: 10px; }
            .team-icon { width: 40px; height: 40px; font-size: 1.5rem; }
            .top-three-title { font-size: 2.5rem; margin-bottom: 30px; }
            .podium-card { width: 90%; padding: 20px; }
            .podium-rank { font-size: 3rem; }
            .podium-icon { font-size: 3rem; }
            .floating-element { display: none; }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Парящие элементы -->
    <div class="floating-element"></div>
    <div class="floating-element"></div>
    <div class="floating-element"></div>
    
    <!-- Научная сетка -->
    <div class="science-grid"></div>

    <!-- ========== ПЕРСОНАЖ (ПОЯВЛЯЕТСЯ ПРИ СОБЫТИЯХ) ========== -->
    <div class="character-message" id="characterMessage">
        <div class="character-dialogue" id="characterDialogue">
            <span id="characterText"></span>
        </div>
        <img id="characterAvatar" src="/images/rating_image.png" alt="Амалия" class="character-avatar">
    </div>

    <!-- Модальное окно для топ-3 -->
    <div class="top-three-modal" id="topThreeModal">
        <h2 class="top-three-title"></h2>
        <div class="top-three-container" id="topThreeContainer">
            <!-- Карточки будут добавлены через JavaScript -->
        </div>
    </div>

    <!-- Основной контент -->
    <div class="header">
        <h1>Таблица команд</h1>
    </div>

    <!-- Селектор лабораторий -->
    <div class="lobby-selector">
        <label for="lobbySelect">📊 Выберите лабораторию:</label>
        <select id="lobbySelect">
            <option value="all">Все лаборатории</option>
        </select>
    </div>

    <div class="stats-bar" id="statsBar">
        <!-- Статистика будет добавлена через JavaScript -->
    </div>

    <div class="leaderboard">
        <div class="leaderboard-header">
            <div>Место</div>
            <div>Команда</div>
            <div>Создано реактивов</div>
        </div>
        <div class="leaderboard-content" id="leaderboardContent">
            <div class="empty-state">Загрузка данных...</div>
        </div>
    </div>

    <div class="last-update" id="lastUpdate">
        <span>Последнее обновление: загрузка...</span>
        <button class="refresh-btn" id="refreshLeaderboardBtn">
            <span>🔄</span> Обновить
        </button>
    </div>

    <div class="controls">
        <a href="/room-selection" class="btn">⚗️ Выбор команды</a>
        <a href="/" class="btn btn-secondary">🏠 Главная страница</a>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        // Защита от выделения текста
        document.addEventListener('selectstart', (e) => e.preventDefault());
        document.addEventListener('contextmenu', (e) => {
            if (!['INPUT', 'TEXTAREA'].includes(e.target.tagName)) e.preventDefault();
        });
        document.addEventListener('dragstart', (e) => {
            if (e.target.tagName === 'IMG') e.preventDefault();
        });

        // ========== ПЕРСОНАЖ (СОБЫТИЙНАЯ ЛОГИКА) ==========
        class LeaderboardCharacter {
            constructor() {
                this.messageEl = document.getElementById('characterMessage');
                this.textEl = document.getElementById('characterText');
                this.avatarEl = document.getElementById('characterAvatar');
                this.timeoutId = null;

                this.hasGreeted = false;
                this.hasFirstPotion = false;
                this.hasReached5 = new Set();
                this.hasAllAbove10 = false;
                this.hasGapEvent = false;
                this.hasFarewell = false;
                this.prevLeaderboard = [];
            }

            showMessage(text, duration = 5000) {
                if (this.timeoutId) clearTimeout(this.timeoutId);
                this.textEl.textContent = text;
                this.messageEl.classList.add('active');
                this.timeoutId = setTimeout(() => {
                    this.messageEl.classList.remove('active');
                }, duration);
            }

            handleLeaderboard(leaderboard) {
                if (!leaderboard || leaderboard.length === 0) return;

                if (!this.hasGreeted) {
                    this.showMessage('Эта таблица команд! Здесь будет вестись счёт созданных реагентов. Желаю всем удачи!', 6000);
                    this.hasGreeted = true;
                }

                const totalPotions = leaderboard.reduce((sum, t) => sum + (t.potionsCount || t.score || 0), 0);
                const prevTotal = this.prevLeaderboard.reduce((sum, t) => sum + (t.potionsCount || t.score || 0), 0);
                if (!this.hasFirstPotion && totalPotions > 0 && prevTotal === 0) {
                    this.showMessage('Вот и создан первый реагент! Становится интересно...', 5000);
                    this.hasFirstPotion = true;
                }

                leaderboard.forEach(team => {
                    const score = team.potionsCount || team.score || 0;
                    if (score >= 5 && !this.hasReached5.has(team.id)) {
                        this.hasReached5.add(team.id);
                        this.showMessage(`Создано 5 реагентов! ${team.name} разблокировала возможность атаковать другие команды. Посмотрим, к чему это приведёт.`, 7000);
                    }
                });

                const allAbove10 = leaderboard.every(team => (team.potionsCount || team.score || 0) > 10);
                if (!this.hasAllAbove10 && allAbove10 && leaderboard.length > 0) {
                    this.showMessage('Наше состязание набрало обороты! Лаборатории работают на полную мощность.', 6000);
                    this.hasAllAbove10 = true;
                }

                const scores = leaderboard.map(t => t.potionsCount || t.score || 0).sort((a,b) => b - a);
                if (scores.length >= 2) {
                    const gap = scores[0] - scores[1];
                    if (gap > 5 && !this.hasGapEvent) {
                        const leaderTeam = leaderboard.find(t => (t.potionsCount || t.score || 0) === scores[0]);
                        this.showMessage(`Кажется, ${leaderTeam.name} отрывается вперед! Смогут ли другие команды сократить разрыв?`, 7000);
                        this.hasGapEvent = true;
                    }
                }

                this.prevLeaderboard = JSON.parse(JSON.stringify(leaderboard));
            }
        }

        const character = new LeaderboardCharacter();

        // ========== ОСНОВНАЯ ЛОГИКА СТРАНИЦЫ ==========
        const socket = io();
        const leaderboardContent = document.getElementById('leaderboardContent');
        const lastUpdateSpan = document.querySelector('#lastUpdate span');
        const refreshLeaderboardBtn = document.getElementById('refreshLeaderboardBtn');
        const topThreeModal = document.getElementById('topThreeModal');
        const topThreeContainer = document.getElementById('topThreeContainer');
        const lobbySelect = document.getElementById('lobbySelect');

        // Создаём элементы статистики
        const statsBar = document.getElementById('statsBar');
        statsBar.innerHTML = `
            <div class="stat-item">
                <div class="stat-value" id="totalTeams">0</div>
                <div class="stat-label">Команд</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="activeTeams">0</div>
                <div class="stat-label">Активно</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="totalPotionsAll">0</div>
                <div class="stat-label">Реактивов</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="completedGames">0</div>
                <div class="stat-label">Завершено</div>
            </div>
        `;

        const totalTeamsEl = document.getElementById('totalTeams');
        const activeTeamsEl = document.getElementById('activeTeams');
        const totalPotionsAllEl = document.getElementById('totalPotionsAll');
        const completedGamesEl = document.getElementById('completedGames');

        let allTeams = [];          // все команды из всех лобби
        let lobbies = [];           // список лобби { id, name, playersCount }
        let currentLobbyId = 'all'; // выбранный лобби

        // Получение иконки команды
        function getTeamIcon(team) {
            const icons = ['⚗️', '🧪', '🔬', '⚡', '🔥', '💧', '🌪️', '💫'];
            return team.icon || icons[Math.floor(Math.random() * icons.length)];
        }

        // Обновление выпадающего списка лобби
        function updateLobbySelect(lobbiesList) {
            lobbies = lobbiesList;
            const currentValue = lobbySelect.value;
            lobbySelect.innerHTML = '<option value="all">Все лаборатории</option>';
            lobbies.forEach(lobby => {
                const option = document.createElement('option');
                option.value = lobby.id;
                option.textContent = `${lobby.name} (${lobby.playersCount} участников)`;
                lobbySelect.appendChild(option);
            });
            // Восстанавливаем выбранное значение, если оно ещё актуально
            if (currentValue !== 'all' && lobbies.some(l => l.id === currentValue)) {
                lobbySelect.value = currentValue;
            } else {
                lobbySelect.value = currentLobbyId;
            }
            currentLobbyId = lobbySelect.value;
        }

        // Фильтрация команд по выбранному лобби
        function getFilteredTeams() {
            if (currentLobbyId === 'all') return allTeams;
            return allTeams.filter(team => team.lobbyId === currentLobbyId);
        }

        // Обновление отображения таблицы и статистики
        function updateDisplay() {
            const filteredTeams = getFilteredTeams();
            const sorted = [...filteredTeams].sort((a, b) => {
                const aScore = a.potionsCount || a.score || 0;
                const bScore = b.potionsCount || b.score || 0;
                return bScore - aScore;
            });

            // Обновляем таблицу
            if (!sorted || sorted.length === 0) {
                leaderboardContent.innerHTML = '<div class="empty-state">Нет данных о командах в этой лаборатории</div>';
            } else {
                leaderboardContent.innerHTML = '';
                sorted.forEach((team, idx) => {
                    const item = document.createElement('div');
                    const rankClass = `rank-${idx + 1}`;
                    const rankItemClass = idx === 0 ? 'first' : idx === 1 ? 'second' : idx === 2 ? 'third' : '';
                    const completedClass = team.completed ? 'completed' : '';
                    item.className = `leaderboard-item ${rankItemClass} ${completedClass}`;
                    const potionsCount = team.potionsCount || team.score || 0;
                    const teamIcon = getTeamIcon(team);
                    const statusText = team.completed ? 'Завершена' : 'В игре';
                    const statusClass = team.completed ? 'status-completed' : 'status-playing';
                    item.innerHTML = `
                        <div class="rank ${rankClass}">${idx + 1}</div>
                        <div class="team-info">
                            <div class="team-icon">${teamIcon}</div>
                            <div class="team-details">
                                <div class="team-name">${team.name}</div>
                                <div class="team-id">Лаб. #${team.id.substring(0, 6)}</div>
                                <div class="team-status">
                                    <span class="status-badge ${statusClass}">${statusText}</span>
                                    <span class="status-badge">👥 ${team.playersCount || 0}/${team.maxPlayers || 4}</span>
                                </div>
                            </div>
                        </div>
                        <div class="potions-count">${potionsCount}</div>
                    `;
                    leaderboardContent.appendChild(item);
                });
            }

            // Обновляем статистику
            const totalTeams = filteredTeams.length;
            const activeTeams = filteredTeams.filter(t => !t.completed && t.playersCount > 0).length;
            const totalPotions = filteredTeams.reduce((sum, t) => sum + (t.potionsCount || t.score || 0), 0);
            const completedGames = filteredTeams.filter(t => t.completed).length;
            totalTeamsEl.textContent = totalTeams;
            activeTeamsEl.textContent = activeTeams;
            totalPotionsAllEl.textContent = totalPotions;
            completedGamesEl.textContent = completedGames;
        }

        // Обработка обновления рейтинга от сервера
        socket.on('leaderboard-updated', (leaderboard) => {
            allTeams = leaderboard;
            updateDisplay();
            lastUpdateSpan.textContent = `Последнее обновление: ${new Date().toLocaleTimeString()}`;
            // Передаём глобальный рейтинг (все команды) для анализа событий персонажа
            character.handleLeaderboard(allTeams);
        });

        // Обработка списка лобби
        socket.on('lobbies-updated', (lobbiesList) => {
            updateLobbySelect(lobbiesList);
        });

        // При изменении выбора лобби
        lobbySelect.addEventListener('change', () => {
            currentLobbyId = lobbySelect.value;
            updateDisplay();
        });

        // Запрос данных при загрузке
        socket.emit('get-leaderboard');
        socket.emit('get-lobbies');

        // Кнопка обновления
        refreshLeaderboardBtn.addEventListener('click', () => {
            socket.emit('get-leaderboard');
            socket.emit('get-lobbies');
            refreshLeaderboardBtn.innerHTML = '<span>⏳</span> Обновление...';
            setTimeout(() => {
                refreshLeaderboardBtn.innerHTML = '<span>🔄</span> Обновить';
            }, 1000);
        });

        // Автообновление каждые 10 секунд
        setInterval(() => {
            socket.emit('get-leaderboard');
            socket.emit('get-lobbies');
        }, 10000);

        // ========== ТОП-3 МОДАЛКА ==========
        function showTopThree() {
            const filtered = getFilteredTeams();
            if (filtered.length < 3) {
                alert('Недостаточно команд для отображения топ-3 в выбранной лаборатории!');
                return;
            }
            const sorted = [...filtered].sort((a, b) => (b.potionsCount || b.score || 0) - (a.potionsCount || a.score || 0));
            const topTeams = sorted.slice(0, 3);
            topThreeContainer.innerHTML = '';

            const positions = [
                { type: 'silver', rank: '2', team: topTeams[1] },
                { type: 'gold', rank: '1', team: topTeams[0] },
                { type: 'bronze', rank: '3', team: topTeams[2] }
            ];

            positions.forEach(pos => {
                if (!pos.team) return;
                const card = document.createElement('div');
                card.className = `podium-card ${pos.type}`;
                card.innerHTML = `
                    <div class="podium-rank">${pos.rank}</div>
                    <div class="podium-icon">${getTeamIcon(pos.team)}</div>
                    <div class="podium-team-name">${pos.team.name}</div>
                    <div class="podium-team-id">Лаб. #${pos.team.id}</div>
                    <div class="podium-score">${pos.team.potionsCount || pos.team.score || 0}</div>
                `;
                topThreeContainer.appendChild(card);
            });

            topThreeModal.classList.add('active');
            document.body.style.overflow = 'hidden';

            setTimeout(() => {
                if (topTeams[0]) {
                    character.showMessage(`${topTeams[0].name} становится победителем! Остальные команды тоже большие молодцы! Спасибо всем за игру!`, 8000);
                    character.hasFarewell = true;
                }
            }, 5000);
        }

        function hideTopThree() {
            topThreeModal.classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && !topThreeModal.classList.contains('active')) {
                e.preventDefault();
                showTopThree();
            } else if (e.code === 'Escape' && topThreeModal.classList.contains('active')) {
                hideTopThree();
            }
        });

        topThreeModal.addEventListener('click', (e) => {
            if (e.target === topThreeModal) hideTopThree();
        });

        // Обработка ошибок
        socket.on('connect_error', (err) => console.error('Socket error:', err));
    </script>
</body>
</html>
